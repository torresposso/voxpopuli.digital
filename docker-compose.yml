name: voxpopuli

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
      args:
        USER_ID: ${USER_ID:-1000}
        GROUP_ID: ${GROUP_ID:-1000}
    ports:
      - "8080:8080"
    volumes:
      - .:/app
      - ./Caddyfile:/etc/frankenphp/Caddyfile
      - ./docker/php/conf.d/uploads.ini:/usr/local/etc/php/conf.d/uploads.ini
    restart: unless-stopped

  node:
    image: node:20-alpine
    working_dir: /app/web/app/themes/voxpopuli
    volumes:
      - .:/app
      - /app/web/app/themes/voxpopuli/node_modules
    ports:
      - "5174:5174"
    command: sh -c "npm install && npm run dev"
    environment:
      APP_URL: http://localhost:8080
      VITE_DEV_HOST: ${VITE_DEV_HOST:-localhost}

  node-caribe:
    image: node:20-alpine
    working_dir: /app/web/app/themes/vox-caribe
    volumes:
      - .:/app
      - /app/web/app/themes/vox-caribe/node_modules
    ports:
      - "5175:5175"
    command: sh -c "npm install && npm run dev"
    environment:
      APP_URL: http://localhost:8080
      VITE_DEV_HOST: ${VITE_DEV_HOST:-localhost}
