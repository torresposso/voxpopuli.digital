<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Rounded clean background context for high visibility on any tab theme (light/dark) -->
  <rect width="512" height="512" rx="128" fill="#ffffff" />
  
  <!-- Symmetrical & mathematically aligned "VP" Monogram -->
  <g transform="translate(10, 0)">
    <!-- Elegant, bold modern "V" in Brand Primary - Royal Violet (#3c1075) -->
    <path d="M 70,130 L 180,370 H 235 L 345,130 H 280 L 210,285 L 135,130 Z" fill="#3c1075" />
    
    <!-- Modern geometric "P" in Brand Secondary - Amber/Gold (#e28a2b) with clean cutout -->
    <path d="M 270,130 H 400 C 455,130 455,250 400,250 H 330 V 370 H 270 V 130 Z M 330,175 V 205 H 390 C 402,205 402,175 390,175 H 330 Z" fill="#e28a2b" fill-rule="evenodd" />
  </g>
</svg>
